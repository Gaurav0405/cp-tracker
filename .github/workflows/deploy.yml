name: Deploy CP Tracker

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd ~/cp-tracker
          git pull origin main
          cd backend
          npm install
          cd ../frontend
          npm install
          npm run build
          pm2 restart cp-tracker-backend